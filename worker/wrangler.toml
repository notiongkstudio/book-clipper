name = "book-clipper"
main = "worker.js"
compatibility_date = "2024-09-23"

# Free tier: 100,000 requests/day
# No KV, Durable Objects, or other paid features needed
# The worker is a pure proxy between the web app and Notion API

[observability]
enabled = true
